apiVersion: apps/v1
kind: Deployment
metadata:
  name: audio-service
  namespace: microservices
spec:
  replicas: 1
  selector:
    matchLabels:
      app: audio-service
  template:
    metadata:
      labels:
        app: audio-service
    spec:
      containers:
      - name: audio-service
        image: docker.io/library/audio-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 5003
---
apiVersion: v1
kind: Service
metadata:
  name: audio-service
  namespace: microservices
spec:
  selector:
    app: audio-service
  ports:
  - port: 5003
    targetPort: 5003
