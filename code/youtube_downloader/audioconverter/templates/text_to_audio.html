<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Text to Audio</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family: 'Inter', Arial, sans-serif;
    background:#020617;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

/* container */
.container{
    width:420px;
    padding:35px;
    border-radius:16px;
    background: rgba(30,41,59,0.7);
    border:1px solid rgba(255,255,255,0.08);
    box-shadow:0 20px 60px rgba(0,0,0,0.8);
    text-align:center;
}

/* heading */
h2{
    margin-bottom:20px;
    font-size:24px;
}

/* textarea */
textarea{
    width:100%;
    height:130px;
    padding:12px;
    border-radius:8px;
    border:none;
    outline:none;
    background:#0f172a;
    color:white;
    resize:none;
    font-size:14px;
}

textarea:focus{
    border:1px solid #2563eb;
}

/* button */
button{
    margin-top:15px;
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:linear-gradient(135deg,#2563eb,#1d4ed8);
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 25px rgba(37,99,235,0.5);
}

/* loading text */
.loading{
    margin-top:10px;
    font-size:13px;
    color:#94a3b8;
    display:none;
}

/* audio */
audio{
    margin-top:20px;
    width:100%;
}

/* download button */
.download-btn{
    display:none;
    margin-top:15px;
    padding:12px;
    background:linear-gradient(135deg,#22c55e,#16a34a);
    border-radius:8px;
    color:white;
    text-decoration:none;
    font-weight:600;
    display:inline-block;
}

.download-btn:hover{
    box-shadow:0 10px 25px rgba(34,197,94,0.5);
}

/* HOME BUTTON */
.home-btn{
    position:fixed;
    top:25px;
    right:30px;
    padding:10px 18px;
    border-radius:8px;
    background:linear-gradient(135deg,#38bdf8,#0ea5e9);
    color:white;
    text-decoration:none;
    font-size:14px;
    font-weight:600;
    box-shadow:0 10px 25px rgba(56,189,248,0.3);
    transition:0.3s;
}

.home-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 25px rgba(56,189,248,0.6);
}

</style>

</head>

<body>

<div class="container">

<h2>🎧 Text to Audio Converter</h2>

<textarea id="text" placeholder="Enter text to convert..."></textarea>

<button onclick="convert()">Convert</button>

<div class="loading" id="loading">Converting...</div>

<audio id="player" controls></audio>

<a id="download" class="download-btn" download="audio.wav">⬇ Download Audio</a>

</div>

<a href="/home" class="home-btn">🏠 Home</a>
<script>

async function convert(){

const text=document.getElementById("text").value

if(!text){
    alert("Enter text first")
    return
}

document.getElementById("loading").style.display="block"

const response=await fetch("/api/audio/convert",{
method:"POST",
headers:{
"Content-Type":"application/x-www-form-urlencoded"
},
body:`text=${encodeURIComponent(text)}`
})

const blob=await response.blob()
const url=URL.createObjectURL(blob)

document.getElementById("player").src=url

// show download button
const downloadBtn=document.getElementById("download")
downloadBtn.href=url
downloadBtn.style.display="inline-block"

document.getElementById("loading").style.display="none"

}

</script>

</body>
</html>
