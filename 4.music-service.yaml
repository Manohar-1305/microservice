apiVersion: apps/v1
kind: Deployment
metadata:
  name: music-service
  namespace: microservices
spec:
  replicas: 1
  selector:
    matchLabels:
      app: music-service
  template:
    metadata:
      labels:
        app: music-service
    spec:
      containers:
      - name: music-service
        image:docker.io/library/music-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 5004
---
apiVersion: v1
kind: Service
metadata:
  name: music-service
  namespace: microservices
spec:
  selector:
    app: music-service
  ports:
  - port: 5004
    targetPort: 5004
