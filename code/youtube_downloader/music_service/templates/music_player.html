<!DOCTYPE html>
<html>
<head>
<title>Music Player</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Inter',Segoe UI,Arial;
background:#020617;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

/* container */
.container{
width:440px;
background:rgba(30,41,59,0.7);
border-radius:18px;
padding:30px;
box-shadow:0 20px 60px rgba(0,0,0,0.8);
border:1px solid rgba(255,255,255,0.08);
}

/* title */
h2{
text-align:center;
margin-bottom:20px;
font-weight:600;
}

/* upload */
.upload{
margin-bottom:20px;
}

input[type=file]{
width:100%;
padding:12px;
background:#0f172a;
border:none;
border-radius:8px;
color:white;
margin-bottom:10px;
}

/* button */
button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:linear-gradient(135deg,#ff4b2b,#ff416c);
color:white;
font-size:15px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 10px 25px rgba(255,65,108,0.5);
}

/* audio player */
audio{
width:100%;
margin-top:20px;
}

/* playlist */
.playlist{
margin-top:20px;
max-height:240px;
overflow-y:auto;
}

/* scrollbar */
.playlist::-webkit-scrollbar{
width:6px;
}

.playlist::-webkit-scrollbar-thumb{
background:#ff416c;
border-radius:10px;
}

/* list items */
.playlist li{
list-style:none;
background:#0f172a;
padding:12px;
margin-bottom:10px;
border-radius:10px;
cursor:pointer;
transition:0.3s;
display:flex;
justify-content:space-between;
align-items:center;
}

.playlist li:hover{
background:linear-gradient(135deg,#ff4b2b,#ff416c);
transform:translateX(5px);
}

/* play icon */
.playlist li::before{
content:"▶";
margin-right:10px;
color:#ff416c;
}

/* HOME BUTTON */
.home-btn{
    position:fixed;
    top:25px;
    right:30px;
    padding:10px 18px;
    border-radius:8px;
    background:linear-gradient(135deg,#38bdf8,#0ea5e9);
    color:white;
    text-decoration:none;
    font-size:14px;
    font-weight:600;
    box-shadow:0 10px 25px rgba(56,189,248,0.3);
    transition:0.3s;
}

.home-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 25px rgba(56,189,248,0.6);
}
</style>
</head>

<body>

<div class="container">

<h2>🎵 Music Player</h2>

<div class="upload">
<form id="uploadForm">
<input type="file" id="musicFile" name="music" accept=".mp3" required>
<button type="submit">Upload Song</button>
</form>
</div>

<audio id="player" controls></audio>

<div class="playlist">
<ul id="playlist"></ul>
</div>

</div>
<a href="/home" class="home-btn">🏠 Home</a>
<script>

const form=document.getElementById("uploadForm")
const playlist=document.getElementById("playlist")
const player=document.getElementById("player")

async function loadSongs(){
const res=await fetch("/list")
const songs=await res.json()

playlist.innerHTML=""

songs.forEach(song=>{
const li=document.createElement("li")
li.innerText=song

li.onclick=()=>{
player.src="/music_files/"+song
player.play()
}

playlist.appendChild(li)
})
}

form.onsubmit=async(e)=>{
e.preventDefault()

const file=document.getElementById("musicFile").files[0]

const formData=new FormData()
formData.append("music",file)

await fetch("/upload",{method:"POST",body:formData})

loadSongs()
}

loadSongs()

</script>

</body>
</html>
