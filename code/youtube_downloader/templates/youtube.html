<!DOCTYPE html>
<html>
<head>
<title>YouTube Downloader</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Inter',Arial;
background:#020617;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

/* container */
.container{
width:420px;
padding:35px;
border-radius:16px;
background:rgba(30,41,59,0.7);
border:1px solid rgba(255,255,255,0.08);
box-shadow:0 20px 60px rgba(0,0,0,0.8);
text-align:center;
}

/* title */
h2{
margin-bottom:20px;
}

/* input */
input{
width:100%;
padding:14px;
border-radius:8px;
border:none;
outline:none;
background:#0f172a;
color:white;
margin-bottom:15px;
}

input:focus{
border:1px solid #ef4444;
}

/* button */
button{
width:100%;
padding:14px;
border:none;
border-radius:8px;
background:linear-gradient(135deg,#ef4444,#b91c1c);
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 10px 25px rgba(239,68,68,0.5);
}

/* helper text */
.helper{
margin-top:10px;
font-size:13px;
color:#94a3b8;
}

/* HOME BUTTON */
.home-btn{
    position:fixed;
    top:25px;
    right:30px;
    padding:10px 18px;
    border-radius:8px;
    background:linear-gradient(135deg,#38bdf8,#0ea5e9);
    color:white;
    text-decoration:none;
    font-size:14px;
    font-weight:600;
    box-shadow:0 10px 25px rgba(56,189,248,0.3);
    transition:0.3s;
}

.home-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 25px rgba(56,189,248,0.6);
}
</style>
</head>

<body>

<div class="container">

<h2>📺 YouTube Downloader</h2>

<input type="text" id="url" placeholder="Paste YouTube URL here">

<button onclick="download()">Download</button>

<div class="helper">
Supports single videos and playlists
</div>

</div>
<a href="/home" class="home-btn">🏠 Home</a>
<script>

async function download(){

const url=document.getElementById("url").value

if(!url){
alert("Enter a YouTube URL")
return
}

window.location="/api/youtube/download?url="+encodeURIComponent(url)

}

</script>
</body>
</html>
