# USER SERVICE (UPDATED TO USE MYSQL)

apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: microservices
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
      - name: user-service
        image: docker.io/library/user-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 5006
        env:
        - name: DB_HOST
          value: user-db
        - name: DB_USER
          value: user
        - name: DB_PASSWORD
          value: userpass
        - name: DB_NAME
          value: usersdb

---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: microservices
spec:
  selector:
    app: user-service
  ports:
  - port: 5006
    targetPort: 5006
