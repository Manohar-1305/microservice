apiVersion: apps/v1
kind: Deployment
metadata:
  name: pdf-service
  namespace: microservices
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pdf-service
  template:
    metadata:
      labels:
        app: pdf-service
    spec:
      containers:
      - name: pdf-service
        image: pdf-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 5001
---
apiVersion: v1
kind: Service
metadata:
  name: pdf-service
  namespace: microservices
spec:
  selector:
    app: pdf-service
  ports:
  - port: 5001
    targetPort: 5001
