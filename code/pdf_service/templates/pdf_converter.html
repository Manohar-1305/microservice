<!DOCTYPE html>
<html>
<head>
<title>PDF to Word Converter</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Inter',Arial;
    background: radial-gradient(circle at top,#020617,#1e293b);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

/* container */
.container{
    width:420px;
    padding:35px;
    border-radius:16px;
    background:rgba(30,41,59,0.7);
    border:1px solid rgba(255,255,255,0.08);
    box-shadow:0 20px 60px rgba(0,0,0,0.8);
    text-align:center;
}

/* heading */
h2{
    margin-bottom:10px;
}

/* subtitle */
.sub{
    font-size:13px;
    color:#94a3b8;
    margin-bottom:20px;
}

/* DROP ZONE */
.drop-zone{
    border:2px dashed #475569;
    padding:25px;
    border-radius:10px;
    cursor:pointer;
    transition:0.3s;
}

.drop-zone:hover{
    border-color:#38bdf8;
}

.drop-zone.dragover{
    border-color:#22c55e;
    background:rgba(34,197,94,0.1);
}

/* hidden input */
input{
    display:none;
}

/* file name */
.file-name{
    margin-top:10px;
    font-size:13px;
    color:#38bdf8;
}

/* button */
button{
    width:100%;
    margin-top:15px;
    padding:14px;
    border:none;
    border-radius:8px;
    background:linear-gradient(135deg,#2563eb,#1d4ed8);
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 25px rgba(37,99,235,0.5);
}

/* progress bar */
.progress{
    margin-top:15px;
    width:100%;
    height:8px;
    background:#1e293b;
    border-radius:10px;
    overflow:hidden;
    display:none;
}

.progress-bar{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#22c55e,#16a34a);
}

/* status */
.status{
    margin-top:10px;
    font-size:13px;
    color:#94a3b8;
}

/* HOME BUTTON */
.home-btn{
    position:fixed;
    top:25px;
    right:30px;
    padding:10px 18px;
    border-radius:8px;
    background:linear-gradient(135deg,#38bdf8,#0ea5e9);
    color:white;
    text-decoration:none;
    font-size:14px;
    font-weight:600;
    box-shadow:0 10px 25px rgba(56,189,248,0.3);
    transition:0.3s;
}

.home-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 25px rgba(56,189,248,0.6);
}

</style>
</head>

<body>

<a href="/home" class="home-btn">🏠 Home</a>

<div class="container">

<h2>📄 PDF → Word</h2>
<p class="sub">Drag & drop your PDF or click below</p>

<form id="pdfForm">

<div class="drop-zone" id="dropZone">
    Drop PDF here or click to upload
</div>

<input type="file" id="file" accept=".pdf" required>

<div class="file-name" id="fileName"></div>

<button type="submit">Convert to Word</button>

<div class="progress" id="progress">
    <div class="progress-bar" id="progressBar"></div>
</div>

<div class="status" id="status"></div>

</form>

</div>

<script>

const dropZone = document.getElementById("dropZone")
const fileInput = document.getElementById("file")
const fileName = document.getElementById("fileName")

// click upload
dropZone.onclick = () => fileInput.click()

// file select
fileInput.onchange = () => {
    fileName.innerText = fileInput.files[0].name
}

// drag events
dropZone.ondragover = (e)=>{
    e.preventDefault()
    dropZone.classList.add("dragover")
}

dropZone.ondragleave = ()=>{
    dropZone.classList.remove("dragover")
}

dropZone.ondrop = (e)=>{
    e.preventDefault()
    dropZone.classList.remove("dragover")
    fileInput.files = e.dataTransfer.files
    fileName.innerText = fileInput.files[0].name
}

// submit
document.getElementById("pdfForm").onsubmit = function(e){

e.preventDefault()

const file = fileInput.files[0]

if(!file){
    alert("Select a PDF")
    return
}

const formData = new FormData()
formData.append("file", file)

const xhr = new XMLHttpRequest()

xhr.open("POST","/api/pdf",true)

// progress
xhr.upload.onprogress = function(e){
    if(e.lengthComputable){
        const percent = (e.loaded / e.total) * 100
        document.getElementById("progress").style.display="block"
        document.getElementById("progressBar").style.width = percent + "%"
        document.getElementById("status").innerText = "Uploading: " + Math.round(percent) + "%"
    }
}

// complete
xhr.onload = function(){

    const blob = xhr.response
    const url = window.URL.createObjectURL(blob)

    const a = document.createElement("a")
    a.href = url
    a.download = "converted.docx"
    a.click()

    document.getElementById("status").innerText = "Download started"
}

xhr.responseType = "blob"
xhr.send(formData)

}

</script>

</body>
</html>
